name: CI

on:
  push:
    branches: [main]
    paths:
      - packages/pixide-react/**
      - converter/**
      - icons/pixel/**
  pull_request:
    paths:
      - packages/pixide-react/**
      - converter/**
      - icons/pixel/**

jobs:
  build:
    name: Build pixide-react
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            converter/package-lock.json
            packages/pixide-react/package-lock.json

      - name: Install converter deps
        run: npm install
        working-directory: converter

      - name: Generate icon TypeScript files
        run: node generate-ts.mjs
        working-directory: converter

      - name: Install pixide-react deps
        run: npm install
        working-directory: packages/pixide-react

      - name: Build
        run: npm run build
        working-directory: packages/pixide-react

      - name: Check dist
        run: |
          test -f packages/pixide-react/dist/cjs/pixide-react.js
          test -f packages/pixide-react/dist/esm/pixide-react.js
          test -f packages/pixide-react/dist/pixide-react.d.ts
          echo "dist OK"
