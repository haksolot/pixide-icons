name: Publish to npm

on:
  push:
    tags:
      - 'pixide-react@*'   # trigger: git tag pixide-react@0.1.0

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish pixide-react
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/pixide-react/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: packages/pixide-react

      - name: Build
        run: npm run build
        working-directory: packages/pixide-react

      - name: Publish
        run: npm publish --access public
        working-directory: packages/pixide-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
